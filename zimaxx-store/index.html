<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <!-- El token del cliente viaja en la URL (?t=...) y las imágenes de
         producto se cargan de dominios externos: sin esto, el token se
         fugaría en el header Referer de cada request de imagen. -->
    <meta name="referrer" content="no-referrer" />
    <link rel="icon" type="image/png" href="/zimaxx.png" />
    <meta name="theme-color" content="#16130d" />
    <!-- Vista previa al compartir el link por WhatsApp. og:image exige URL
         absoluta: reemplazar zimaxx-store.netlify.app si el dominio final
         es otro. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Zimaxx Store" />
    <meta property="og:title" content="Zimaxx Store — Fragancias al por mayor" />
    <meta
      property="og:description"
      content="Catálogo mayorista de fragancias. Abre tu link personalizado para ver los precios de tu lista."
    />
    <meta property="og:image" content="https://zimaxx-store.netlify.app/zimaxx.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,500;1,9..144,600&family=Outfit:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>Zimaxx Store</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
