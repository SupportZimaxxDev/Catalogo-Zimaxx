[build]
  command = "npm run build"
  publish = "dist"

# SPA: toda ruta se sirve desde index.html (React Router maneja /admin)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers de seguridad. Referrer-Policy es el crítico: el token del cliente
# viaja en la URL y las imágenes de producto vienen de dominios externos.
[[headers]]
  for = "/*"
  [headers.values]
    Referrer-Policy = "no-referrer"
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-Robots-Tag = "noindex"
